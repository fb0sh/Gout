<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}goutd{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, "SF Pro Text", "Noto Sans SC", sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
        .nav { border-bottom: 1px solid #21262d; padding: 0 24px; display: flex; align-items: center; height: 52px; gap: 24px; background: #161b22; }
        .nav a { color: #8b949e; text-decoration: none; font-size: 14px; line-height: 52px; border-bottom: 2px solid transparent; }
        .nav a:hover { color: #e6edf3; border-bottom-color: #8b949e; }
        .nav a.active { color: #e6edf3; border-bottom-color: #e6edf3; }
        .nav .brand { font-weight: 600; font-size: 15px; margin-right: auto; color: #e6edf3; letter-spacing: 0.02em; }
        .main { max-width: 800px; margin: 40px auto; padding: 0 24px; }
        h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; color: #e6edf3; letter-spacing: -0.01em; }
        h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #e6edf3; letter-spacing: -0.01em; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 8px 12px; font-weight: 500; color: #8b949e; border-bottom: 1px solid #21262d; font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; }
        td { padding: 10px 12px; border-bottom: 1px solid #21262d; }
        tr:hover td { background: #161b22; }
        .mono { font-family: "SF Mono", "Fira Code", monospace; font-size: 13px; }
        .tag { display: inline-block; padding: 1px 8px; border-radius: 3px; font-size: 12px; font-weight: 500; }
        .tag-tcp { background: #1f6feb22; color: #79c0ff; }
        .tag-udp { background: #8957e522; color: #d2a8ff; }
        .tag-active { background: #23863622; color: #7ee787; }
        .tag-waiting { background: #9e6a0322; color: #d29922; }
        .empty { text-align: center; padding: 64px 0; color: #484f58; font-size: 14px; }
        .btn { display: inline-block; padding: 5px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #30363d; background: #21262d; color: #e6edf3; text-decoration: none; line-height: 20px; }
        .btn:hover { background: #30363d; }
        .btn-primary { background: #238636; border-color: #238636; color: #ffffff; }
        .btn-primary:hover { background: #2ea043; }
        .btn-danger { color: #f85149; border-color: #f8514933; }
        .btn-danger:hover { background: #f8514911; }
        form { display: flex; gap: 8px; margin-bottom: 24px; align-items: center; }
        input[type="text"], input[type="password"] { padding: 5px 12px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #e6edf3; font-size: 14px; line-height: 20px; outline: none; }
        input:focus { border-color: #58a6ff; }
        code { background: #161b22; padding: 1px 6px; border-radius: 3px; font-size: 13px; color: #79c0ff; }
        .box { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 12px 16px; margin-bottom: 24px; }
        .box label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
        .box .val { font-family: "SF Mono", "Fira Code", monospace; font-size: 13px; color: #e6edf3; word-break: break-all; }
        .hint { color: #484f58; font-size: 13px; margin-top: 8px; }
        .sec { margin-bottom: 32px; }
    </style>
</head>
<body>
    <div class="nav">
        <span class="brand">goutd</span>
        <a href="/dashboard" class="{% if active_page == "dashboard" %}active{% endif %}">Tunnels</a>
        <a href="/keys" class="{% if active_page == "keys" %}active{% endif %}">Keys</a>
        <a href="/logout" style="color:#484f58;font-size:13px;">Logout</a>
    </div>
    <div class="main">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
