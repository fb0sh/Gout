{% extends "base.html" %}
{% block title %}Keys — goutd{% endblock %}
{% block content %}
<h1>API Keys</h1>

<div class="sec">
<h2>Admin Key</h2>
<div class="box">
    <label>Admin API Key — use as <code>X-Admin-Key</code> header for API calls</label>
    <div class="val">{{ admin_key }}</div>
</div>
</div>

<div class="sec">
<h2>Tunnel Keys</h2>

<form method="POST" action="/keys">
    <input type="text" name="name" placeholder="e.g. my laptop" required style="flex:1">
    <button type="submit" class="btn btn-primary">Create Key</button>
</form>

{% if keys.is_empty() %}
<div class="empty">
    <p>No tunnel keys yet</p>
</div>
{% else %}
<table>
    <thead>
        <tr>
            <th>Key</th>
            <th>Name</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for k in keys %}
        <tr>
            <td class="mono">{{ k.key }}</td>
            <td>{{ k.name }}</td>
            <td>
                <form method="POST" action="/keys/delete/{{ k.key }}" style="display:inline;margin:0" onsubmit="return confirm('Delete {{ k.name }}?')">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endif %}
</div>
{% endblock %}
