name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
            packages: gcc-i686-linux-gnu
            linker: i686-linux-gnu-gcc
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            packages: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
          # macOS
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation packages
        if: matrix.packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Set cross-compilation linker
        if: matrix.linker
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << EOF
          [target.${{ matrix.target }}]
          linker = "${{ matrix.linker }}"
          EOF

      - name: Build gout
        run: cargo build --release --target ${{ matrix.target }} -p gout

      - name: Build goutd
        run: cargo build --release --target ${{ matrix.target }} -p goutd

      - name: Package binaries
        shell: bash
        run: |
          EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then EXT=".exe"; fi
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/gout${EXT}" "staging/gout-${{ matrix.target }}${EXT}"
          cp "target/${{ matrix.target }}/release/goutd${EXT}" "staging/goutd-${{ matrix.target }}${EXT}"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: staging/*
          generate_release_notes: true
